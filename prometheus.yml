global:
  scrape_interval: 5s

scrape_configs:
  - job_name: "api"
    dns_sd_configs:
      - names:
          - "tasks.study-go_api"
        type: "A"
        port: 8080

  - job_name: "worker"
    dns_sd_configs:
      - names:
          - "tasks.study-go_worker"
        type: "A"
        port: 8080

  - job_name: "postgres"
    static_configs:
      - targets: ["postgres-exporter:9187"]

  - job_name: 'kafka'
    static_configs:
      - targets: ['kafka:5556']

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]